<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Write a Review</title>
  <link rel="stylesheet" href="./src/output.css">
    <link rel="shortcut icon" href="./assets/logo-removebg.png" type="image/x-icon">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen transition-colors duration-200 font-sans">

  <!-- Navbar -->
  <nav class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
    <a href="./index.html" class="flex items-center gap-2.5">
      <div   class=" rounded-lg flex items-center justify-center flex-shrink-0 text-xl text-[#1b1464] dark:text-white">
        <!-- <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg> -->
    <i class="fa-solid fa-arrow-left"></i>  
    </div>
      <span class="font-semibold text-md text-[#1b1464] dark:text-white">Back</span>
    </a>
   
  </nav>

  <!-- Page header -->
  <header  class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 py-10 px-4 text-center">
    <p data-aos="fade-up" class="text-xs font-semibold tracking-widest text-[#1B1464] uppercase mb-2">Share your experience</p>
    <h1 data-aos="fade-up" class="text-3xl font-bold text-[#1B1464] dark:text-white mb-1">Write a university review</h1>
    <p data-aos="fade-up" class=" max-sm:text-sm md:text-md lg:text-lg   font-stretch-50% text-gray-500 dark:text-blue-50">Your honest review helps future students choose wisely.</p>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-10 space-y-8">

 

    <!-- ── FORM ── -->
    <div data-aos="fade-up" class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl divide-y divide-gray-100 dark:divide-gray-800">

      <!-- Step 1: University -->
      <div class="p-6 space-y-4">
        <h2 class="text-sm font-semibold text-gray-900 dark:text-white flex items-center gap-2">
          <span class="w-5 h-5 rounded-full bg-blue-600 text-white text-xs flex items-center justify-center font-bold shrink-0">1</span>
          University
        </h2>
        <div class="space-y-1">
          <label class="text-xs font-medium text-gray-500 dark:text-gray-400">Select university</label>
          <select id="inpUni" class="w-full px-3 py-2.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-blue-500">
            <option value="">Choose a university...</option>
            <option data-color="bg-blue-600">Royal University of Phnom Penh (RUPP)</option>
            <option data-color="bg-emerald-600">Institute of Technology of Cambodia (ITC)</option>
            <option data-color="bg-amber-500">National University of Management (NUM)</option>
            <option data-color="bg-pink-600">Paññāsāstra University of Cambodia (PUC)</option>
            <option data-color="bg-purple-600">Royal University of Agriculture (RUA)</option>
            <option data-color="bg-red-500">University of Health Sciences (UHS)</option>
            <option data-color="bg-teal-600">Royal Academy of Cambodia</option>
            <option data-color="bg-orange-500">Build Bright University (BBU)</option>
            <option data-color="bg-cyan-600">Western University Cambodia</option>
            <option  data-color="bg-blue-600">Institute of Science and Technology Advanced Development</option>
            <option data-color="bg-indigo-600">Other</option>
          </select>
        </div>
      </div>

      <!-- Step 2: About you -->
      <div class="p-6 space-y-4">
        <h2 class="text-sm font-semibold text-gray-900 dark:text-white flex items-center gap-2">
          <span class="w-5 h-5 rounded-full bg-blue-600 text-white text-xs flex items-center justify-center font-bold shrink-0">2</span>
          About you
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-1">
            <label class="text-xs font-medium text-gray-500 dark:text-gray-400">Full name</label>
            <input id="inpName" type="text" placeholder="e.g. Sophea Ros"
              class="w-full px-3 py-2.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white placeholder-gray-400 focus:border-blue-500" />
          </div>
          <div class="space-y-1">
            <label class="text-xs font-medium text-gray-500 dark:text-gray-400">Province / City</label>
            <select id="inpProvince" class="w-full px-3 py-2.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-blue-500">
              <option value="">Select province</option>
              <option>Phnom Penh</option>
            <option>Banteay Meanchey</option>
            <option>Battambang</option>
            <option>Kampong Cham</option>
            <option>Kampong Chhnang</option>
            <option>Kampong Speu</option>
            <option>Kampong Thom</option>
            <option>Kampot</option>
            <option>Kandal</option>
            <option>Kep</option>
            <option>Koh Kong</option>
            <option>Kratie</option>
            <option>Mondulkiri</option>
            <option>Oddar Meanchey</option>
            <option>Pailin</option>
            <option>Preah Vihear</option>
            <option>Prey Veng</option>
            <option>Pursat</option>
            <option>Ratanakiri</option>
            <option>Siem Reap</option>
            <option>Sihanoukville</option>
            <option>Stung Treng</option>
            <option>Svay Rieng</option>
            <option>Takéo</option>
            <option>Tboung Khmum</option>
            </select>
          </div>
          <div class="space-y-1">
            <label class="text-xs font-medium text-gray-500 dark:text-gray-400">Faculty / Major</label>
            <input id="inpFaculty" type="text" placeholder="e.g. Civil Engineering"
              class="w-full px-3 py-2.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white placeholder-gray-400 focus:border-blue-500" />
          </div>
          <div class="space-y-1">
            <label class="text-xs font-medium text-gray-500 dark:text-gray-400">Year of study</label>
            <select id="inpYear" class="w-full px-3 py-2.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-blue-500">
              <option value="">Select year</option>
              <option>Year 1</option><option>Year 2</option><option>Year 3</option>
              <option>Year 4</option><option>Year 5</option><option>Postgraduate</option>
              <option>Fresh Graduate</option><option>Alumni</option>
            </select>
          </div>
        </div>
      </div>

     

      <!-- Step 3: Review text -->
      <div class="p-6 space-y-4">
        <h2 class="text-sm font-semibold text-gray-900 dark:text-white flex items-center gap-2">
          <span class="w-5 h-5 rounded-full bg-blue-600 text-white text-xs flex items-center justify-center font-bold shrink-0">4</span>
          Your review
        </h2>
        <div class="space-y-1">
          <label class="text-xs font-medium text-gray-500 dark:text-gray-400">Review title</label>
          <input id="inpTitle" type="text" placeholder="e.g. World-class lecturers, local heart"
            class="w-full px-3 py-2.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white placeholder-gray-400 focus:border-blue-500" />
        </div>
        <div class="space-y-1">
          <label class="text-xs font-medium text-gray-500 dark:text-gray-400">Your review</label>
          <textarea id="inpBody" rows="4" placeholder="Tell future students what studying here is really like — classes, campus, community, career..."
            class="w-full px-3 py-2.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white placeholder-gray-400 focus:border-blue-500 resize-none leading-relaxed"></textarea>
          <p class="text-xs text-gray-400 dark:text-gray-500 text-right"><span id="charCount">0</span> / 300</p>
        </div>
      </div>

      <!-- Submit -->
      <div  class="p-6 flex items-center justify-between gap-4 flex-wrap">
        <p class="text-xs text-gray-400 dark:text-gray-500">Your review will be visible after moderation.</p>
        <button data-aos="zoom-in" id="submitBtn" type="button" onclick="submitReview()"
          class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white text-sm font-semibold rounded-xl transition-all duration-150">
          Post review →
        </button>
      </div>
    </div>
  </script>
  <!-- flowbite script -->
     <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
         <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
         <script>
        // Initialize AOS using Vanilla JS
        
        document.addEventListener('DOMContentLoaded', function () {
            AOS.init({
                duration: 800, // Animation duration in ms
                once: true,    // Whether animation should happen only once - while scrolling down
                offset: 100    // Offset (in px) from the original trigger point
            });
        });
    </script>
    </body>
</html>
