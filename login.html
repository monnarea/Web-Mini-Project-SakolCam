<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./src/output.css">
    <link rel="shortcut icon" href="./assets/logo-removebg.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-[#1b1464] dark:bg-gray-900 text-black  flex align-middle justify-center h-screen items-center">
    <section class="flex justify-center bg-white block w-auto rounded-3xl max-w-[900px] max-sm:flex-col max-sm:w-auto h-[400px] max-sm:h-auto max-sm:my-10" >
        <div  data-aos="fade-up">
            <a class="m-5 max-sm:text-xl text-2xl font-bold text-[#1b1464] absolute" href="./index.html"> <i class="fa-solid fa-arrow-left-long"></i></a>
            <img  class="w-[450px] max-sm:w-[200px] mt-5 max-sm:ml-9" src="./assets/Sign up-bro.png" alt="">
        </div>
<div  data-aos="fade-left" class="w-full max-w-sm bg-neutral-primary-soft p-6  rounded-base shadow-xs">
    <form action="#">
        <h5 class="text-xl font-bold text-[#67191f] mb-6">Sign in to our platform</h5>
        <div class="mb-4">
            <label for="email" class="block mb-2.5 text-sm font-medium text-heading">Your email</label>
            <input type="email" id="email" class="bg-gray-200/20 border border-default-medium text-heading text-sm rounded-xl focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="example@company.com" required />
        </div>
        <div>
            <label for="password" class="block mb-2.5 text-sm font-medium text-heading">Your password</label>
            <input type="password" id="password" class="bg-gray-200/20 border border-default-medium text-heading text-sm rounded-xl focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="•••••••••" required />
        </div>
        <div class="flex items-start my-6">
            <div class="flex items-center">
                <input id="checkbox-remember" type="checkbox" value="" class="w-4 h-4 border border-default-medium rounded-xs bg-gray-200/20 focus:ring-2 focus:ring-brand-soft">
                <label for="checkbox-remember" class="ms-2 text-sm font-medium text-heading">Remember me</label>
            </div>
            <a href="#" class="ms-auto text-sm font-medium text-blue-700 hover:underline">Forget Password?</a>
        </div>
        <button type="submit" class="text-white bg-[#1b1464] hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-xl text-sm px-4 py-2.5 focus:outline-none w-full mb-3">Login to your account</button>
        <div class="text-sm font-medium text-body">Not registered? <a href="/register.html" class="text-blue-700 hover:underline">Create account</a></div>
    </form>
</div>
</section>
<!-- flowbite script -->
     <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
         <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        // Initialize AOS using Vanilla JS
        document.addEventListener('DOMContentLoaded', function () {
            AOS.init({
                duration: 800, // Animation duration in ms
                once: true,    // Whether animation should happen only once - while scrolling down
                offset: 100    // Offset (in px) from the original trigger point
            });
        });
    </script>
</body>
</html>
